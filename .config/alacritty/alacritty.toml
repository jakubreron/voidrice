[general]
import = ["./colorscheme.toml"]

[colors]
draw_bold_text_with_bright_colors = true

[font]
size = 13.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Light"

[font.offset]
x = -1
y = -2

[window]
decorations = "Buttonless"
option_as_alt = "Both"
opacity = 0.92

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
